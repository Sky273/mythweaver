# Local development database only — the app itself deploys to Vercel, with
# a managed Postgres (Neon, via the Vercel Postgres integration) and Vercel
# Blob for file storage in production. This just gives `npm run dev` a
# Postgres to talk to without installing it natively.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

volumes:
  db_data:
